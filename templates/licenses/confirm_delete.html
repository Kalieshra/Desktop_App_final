{% extends "base.html" %}

{% block title %}تأكيد الحذف - التراخيص{% endblock %}

{% block content %}
<div class="mb-4">
    <h3>تأكيد الحذف</h3>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i>
            هل أنت متأكد من حذف هذا السجل؟ هذا الإجراء لا يمكن التراجع عنه.
        </div>

        <table class="table table-bordered mb-4">
            <tbody>
                <tr>
                    <th class="table-light" style="width: 200px;">العنصر</th>
                    <td>{{ object }}</td>
                </tr>
            </tbody>
        </table>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> تأكيد الحذف
            </button>
            <a href="{% url 'licenses:channel_list' %}" class="btn btn-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
